# Training hyperparameters for YOLOv8 (classifier, dung chung dataset ImageFolder).
task: classify
model: yolov8m-cls.pt
epochs: 200
patience: 50
batch: 32
imgsz: 224
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 5
warmup_momentum: 0.8
warmup_bias_lr: 0.1
cos_lr: true
dropout: 0.05
device: "0"
workers: 4
seed: 0
deterministic: true
pretrained: true
cache: true
amp: true
name: result_train
