# Hyperparameters for the Vision Transformer classifier (timm).
model: vit_base_patch16_224
pretrained: true
num_classes: 4
image_size: 224
image_channels: 3
batch_size: 32
epochs: 5
optimizer: adamw
lr: 0.0001
weight_decay: 0.0001
scheduler: cosine
warmup_epochs: 3
gradient_clipping: 1.0
data_augmentation: true
evaluation_metrics: [accuracy, loss, confusion_matrix]
